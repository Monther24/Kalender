<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Luisa & Deiaa – Kalender</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --accent: #c9a96e;
    --luisa: #b07bb0;
    --deiaa: #6ea8c9;
    --shared: #c9a96e;
    --text: #e8e6e0;
    --text-muted: #6e6e80;
    --text-dim: #3a3a48;
    --danger: #c96e6e;
    --success: #6ec98a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* LOADING SCREEN */
  #loading-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .loading-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .loading-spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text { font-size: 13px; color: var(--text-muted); letter-spacing: 0.06em; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SYNC BAR */
  .sync-bar {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--success);
    color: #0d0d0f;
    font-size: 12px; font-weight: 500;
    text-align: center; padding: 7px;
    z-index: 90;
    letter-spacing: 0.06em;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .sync-bar.show { opacity: 1; }

  /* USER SELECTOR */
  #user-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 100;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    animation: fadeIn 0.4s ease;
  }
  #user-screen.visible { display: flex; }

  .user-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px; font-weight: 300;
    color: var(--accent); letter-spacing: 0.04em;
    margin-bottom: 8px; text-align: center;
  }

  .user-subtitle {
    font-size: 13px; color: var(--text-muted);
    margin-bottom: 56px; letter-spacing: 0.08em; text-transform: uppercase;
  }

  .user-card {
    width: 100%; padding: 28px 24px;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--surface); margin-bottom: 16px;
    cursor: pointer; transition: all 0.25s ease;
    display: flex; align-items: center; gap: 20px;
    position: relative; overflow: hidden;
  }
  .user-card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px; border-radius: 2px;
  }
  .user-card.luisa::before { background: var(--luisa); }
  .user-card.deiaa::before { background: var(--deiaa); }
  .user-card:hover, .user-card:active { background: var(--surface2); transform: translateY(-2px); }

  .user-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-size: 22px; flex-shrink: 0;
  }
  .luisa .user-avatar { background: rgba(176,123,176,0.15); color: var(--luisa); }
  .deiaa .user-avatar { background: rgba(110,168,201,0.15); color: var(--deiaa); }
  .user-info-name { font-size: 19px; font-weight: 500; color: var(--text); }
  .user-info-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* MAIN APP */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  #app.visible { display: flex; }

  /* HEADER */
  .header { padding: 52px 24px 20px; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
  .header-greeting { font-size: 12px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .header-name { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--text); }
  .header-name span { color: var(--accent); }

  .header-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-size: 18px;
    cursor: pointer; transition: opacity 0.2s; flex-shrink: 0;
  }
  .header-avatar:hover { opacity: 0.8; }
  .header-avatar.luisa { background: rgba(176,123,176,0.2); color: var(--luisa); }
  .header-avatar.deiaa { background: rgba(110,168,201,0.2); color: var(--deiaa); }

  /* WEEK NAV */
  .week-nav { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; margin-bottom: 20px; }
  .week-nav-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-muted); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; transition: all 0.2s;
  }
  .week-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .week-label { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--text-muted); letter-spacing: 0.05em; }

  /* WEEK STRIP */
  .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 20px; margin-bottom: 28px; }
  .day-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; padding: 8px 4px; border-radius: var(--radius-sm); transition: background 0.2s; }
  .day-cell:hover { background: var(--surface); }
  .day-name { font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .day-num { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text); transition: all 0.2s; }
  .day-cell.today .day-num { background: var(--accent); color: #0d0d0f; font-weight: 500; }
  .day-cell.selected .day-num { background: var(--surface2); border: 1px solid var(--accent); color: var(--accent); }
  .day-dots { display: flex; gap: 3px; height: 6px; align-items: center; justify-content: center; }
  .day-dot { width: 5px; height: 5px; border-radius: 50%; }

  /* LEGEND */
  .legend { display: flex; gap: 16px; padding: 0 24px; margin-bottom: 20px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* CONTENT */
  .content { flex: 1; padding: 0 20px 100px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 11px; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
  .selected-date-display { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--accent); }

  /* CARDS */
  .appt-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 10px;
    position: relative; overflow: hidden; transition: all 0.2s;
  }
  .appt-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .appt-card.luisa::before { background: var(--luisa); }
  .appt-card.deiaa::before { background: var(--deiaa); }
  .appt-card.shared::before { background: var(--shared); }

  .appt-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .appt-title { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; flex: 1; margin-right: 12px; }
  .appt-time { font-size: 12px; color: var(--text-muted); white-space: nowrap; margin-top: 2px; }
  .appt-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .appt-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; letter-spacing: 0.05em; }
  .badge-luisa { background: rgba(176,123,176,0.15); color: var(--luisa); }
  .badge-deiaa { background: rgba(110,168,201,0.15); color: var(--deiaa); }
  .badge-shared { background: rgba(201,169,110,0.15); color: var(--shared); }
  .appt-status { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .status-pending { background: rgba(201,169,110,0.1); color: var(--accent); border: 1px solid rgba(201,169,110,0.3); }
  .status-accepted { background: rgba(110,201,138,0.1); color: var(--success); }
  .status-declined { background: rgba(201,110,110,0.1); color: var(--danger); }

  .appt-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .btn-accept, .btn-decline, .btn-edit {
    flex: 1; padding: 10px; border-radius: var(--radius-sm); border: none;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
  }
  .btn-accept { background: rgba(110,201,138,0.15); color: var(--success); border: 1px solid rgba(110,201,138,0.3); }
  .btn-decline { background: rgba(201,110,110,0.1); color: var(--danger); border: 1px solid rgba(201,110,110,0.2); }
  .btn-edit { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); flex: 0 0 auto; padding: 10px 14px; }
  .btn-accept:hover { background: rgba(110,201,138,0.25); }
  .btn-decline:hover { background: rgba(201,110,110,0.2); }
  .btn-edit:hover { color: var(--text); }

  .empty-state { text-align: center; padding: 48px 24px; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 14px; color: var(--text-muted); }

  /* FAB */
  .fab {
    position: fixed; bottom: 88px; right: 24px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); border: none; color: #0d0d0f; font-size: 24px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(201,169,110,0.35); transition: all 0.25s; z-index: 50;
  }
  .fab:hover { transform: scale(1.08); }
  .fab:active { transform: scale(0.96); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: rgba(13,13,15,0.92); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; padding: 12px 0 24px; z-index: 40;
  }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px; color: var(--text-dim); transition: color 0.2s; position: relative; }
  .nav-item.active { color: var(--accent); }
  .nav-item:hover { color: var(--text-muted); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; letter-spacing: 0.06em; font-weight: 500; }
  .notif-badge {
    position: absolute; top: -2px; right: 18px;
    width: 16px; height: 16px; background: var(--danger);
    border-radius: 50%; font-size: 9px; color: white;
    display: none; align-items: center; justify-content: center; font-weight: 600;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: flex; align-items: flex-end; animation: fadeIn 0.2s ease;
  }
  .modal {
    background: var(--surface); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 430px; margin: 0 auto;
    padding: 28px 24px 48px; border-top: 1px solid var(--border);
    animation: slideUp 0.3s ease;
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 24px; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; color: var(--text); margin-bottom: 24px; }
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; display: block; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .type-btn { padding: 12px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; text-align: center; transition: all 0.2s; }
  .type-btn.active-luisa { background: rgba(176,123,176,0.2); border-color: var(--luisa); color: var(--luisa); }
  .type-btn.active-deiaa { background: rgba(110,168,201,0.2); border-color: var(--deiaa); color: var(--deiaa); }
  .type-btn.active-shared { background: rgba(201,169,110,0.2); border-color: var(--shared); color: var(--shared); }

  .btn-save { width: 100%; padding: 16px; background: var(--accent); color: #0d0d0f; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; letter-spacing: 0.04em; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-save:hover:not(:disabled) { opacity: 0.9; }
  .btn-cancel { width: 100%; padding: 14px; background: transparent; color: var(--text-muted); border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; margin-top: 4px; transition: color 0.2s; }
  .btn-cancel:hover { color: var(--text); }

  /* NOTIFS */
  .notif-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 10px; }
  .notif-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .notif-text { font-size: 14px; color: var(--text); line-height: 1.4; }
  .notif-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .view-panel { display: none; }
  .view-panel.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-title">Luisa & Deiaa</div>
  <div class="loading-spinner"></div>
  <div class="loading-text">Verbinde mit Supabase…</div>
</div>

<div class="sync-bar" id="sync-bar">✓ Synchronisiert</div>

<div id="user-screen">
  <div class="user-title">Luisa & Deiaa</div>
  <div class="user-subtitle">Wer bist du?</div>
  <div class="user-card luisa" onclick="selectUser('luisa')">
    <div class="user-avatar">L</div>
    <div><div class="user-info-name">Luisa</div><div class="user-info-sub">Luisas Kalender öffnen</div></div>
  </div>
  <div class="user-card deiaa" onclick="selectUser('deiaa')">
    <div class="user-avatar">D</div>
    <div><div class="user-info-name">Deiaa</div><div class="user-info-sub">Deiaas Kalender öffnen</div></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-greeting">Willkommen zurück</div>
        <div class="header-name" id="header-name">–</div>
      </div>
      <div class="header-avatar" id="header-avatar" onclick="switchUser()"></div>
    </div>
  </div>

  <div class="week-nav">
    <button class="week-nav-btn" onclick="changeWeek(-1)">‹</button>
    <div class="week-label" id="week-label">–</div>
    <button class="week-nav-btn" onclick="changeWeek(1)">›</button>
  </div>

  <div class="week-strip" id="week-strip"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--luisa)"></div>Luisa</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--deiaa)"></div>Deiaa</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--shared)"></div>Beide</div>
  </div>

  <div class="content">
    <div class="view-panel active" id="view-calendar">
      <div class="section-header">
        <div class="section-title">Termine</div>
        <div class="selected-date-display" id="selected-date-display">–</div>
      </div>
      <div id="appointments-list"></div>
    </div>

    <div class="view-panel" id="view-all">
      <div class="section-header"><div class="section-title">Alle Termine</div></div>
      <div id="all-list"></div>
    </div>

    <div class="view-panel" id="view-notifs">
      <div class="section-header"><div class="section-title">Benachrichtigungen</div></div>
      <div id="notifs-list"></div>
    </div>
  </div>

  <button class="fab" onclick="openAddModal()">+</button>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchView('calendar',this)">
      <div class="nav-icon">📅</div><div class="nav-label">Kalender</div>
    </div>
    <div class="nav-item" onclick="switchView('all',this)">
      <div class="nav-icon">📋</div><div class="nav-label">Alle</div>
    </div>
    <div class="nav-item" onclick="switchView('notifs',this)" id="nav-notifs">
      <div class="nav-icon">🔔</div><div class="nav-label">Info</div>
      <div class="notif-badge" id="notif-count">0</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Neuer Termin</div>
    <div class="form-group">
      <label class="form-label">Titel</label>
      <input class="form-input" id="f-title" type="text" placeholder="z.B. Arzttermin, Kino…">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Datum</label>
        <input class="form-input" id="f-date" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Uhrzeit</label>
        <input class="form-input" id="f-time" type="time">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Für wen?</label>
      <div class="type-toggle">
        <button class="type-btn" id="tb-luisa" onclick="setType('luisa')">Luisa</button>
        <button class="type-btn" id="tb-deiaa" onclick="setType('deiaa')">Deiaa</button>
        <button class="type-btn" id="tb-shared" onclick="setType('shared')">Beide</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notiz (optional)</label>
      <input class="form-input" id="f-note" type="text" placeholder="Kurze Notiz…">
    </div>
    <button class="btn-save" id="btn-save" onclick="saveAppointment()">Speichern</button>
    <button class="btn-cancel" onclick="closeModalDirect()">Abbrechen</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://swttbecsitjjymmgvppz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3dHRiZWNzaXRqanltbWd2cHB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzE4MDAsImV4cCI6MjA5MDMwNzgwMH0.iMAD2G9A3KVecB2OGKHQTpSY3K7u_mCfWDmsmr3NSNA';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let selectedDate = new Date(); selectedDate.setHours(0,0,0,0);
let currentWeekOffset = 0;
let editingId = null;
let selectedType = 'luisa';
let appointments = [];
let notifications = JSON.parse(localStorage.getItem('ludi-notifs') || '[]');

const DAYS = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

async function init() {
  try {
    const { data, error } = await sb.from('appointments').select('*');
    if (error) throw error;
    appointments = data || [];
  } catch(e) {
    console.error(e);
  }
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('user-screen').classList.add('visible');

  sb.channel('appointments')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'appointments' }, async () => {
      const { data } = await sb.from('appointments').select('*');
      appointments = data || [];
      renderWeek();
      renderAppointments();
      renderAllList();
      showSync();
    })
    .subscribe();
}

function showSync() {
  const b = document.getElementById('sync-bar');
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 2000);
}

function selectUser(user) {
  currentUser = user;
  document.getElementById('user-screen').classList.remove('visible');
  document.getElementById('app').classList.add('visible');
  const av = document.getElementById('header-avatar');
  av.className = 'header-avatar ' + user;
  av.textContent = user === 'luisa' ? 'L' : 'D';
  const other = user === 'luisa' ? 'Deiaa' : 'Luisa';
  document.getElementById('header-name').innerHTML = (user === 'luisa' ? 'Luisa' : 'Deiaa') + ' <span>& ' + other + '</span>';
  selectedType = user;
  updateTypeButtons();
  renderWeek();
  renderAppointments();
  renderNotifBadge();
}

function switchUser() {
  currentUser = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('user-screen').classList.add('visible');
}

function getWeekStart(offset = 0) {
  const now = new Date();
  const d = new Date(now);
  d.setDate(now.getDate() - ((now.getDay() + 6) % 7) + (offset * 7));
  d.setHours(0,0,0,0);
  return d;
}

function changeWeek(dir) { currentWeekOffset += dir; renderWeek(); renderAppointments(); }

function renderWeek() {
  const ws = getWeekStart(currentWeekOffset);
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  document.getElementById('week-label').textContent =
    ws.getDate() + '. ' + MONTHS[ws.getMonth()].slice(0,3) + ' – ' +
    we.getDate() + '. ' + MONTHS[we.getMonth()].slice(0,3);

  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(d.getDate() + i);
    const dStr = d.toISOString().split('T')[0];
    const isToday = d.getTime() === today.getTime();
    const isSelected = dStr === selectedDate.toISOString().split('T')[0];
    const dots = [...new Set(appointments.filter(a => a.date === dStr).map(a => a.type))];
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday?' today':'') + (isSelected?' selected':'');
    cell.innerHTML = `<div class="day-name">${DAYS[d.getDay()]}</div><div class="day-num">${d.getDate()}</div><div class="day-dots">${dots.map(t=>`<div class="day-dot" style="background:var(--${t})"></div>`).join('')}</div>`;
    cell.onclick = () => { selectedDate = new Date(d); selectedDate.setHours(0,0,0,0); renderWeek(); renderAppointments(); switchView('calendar'); };
    strip.appendChild(cell);
  }
}

function renderAppointments() {
  const dStr = selectedDate.toISOString().split('T')[0];
  document.getElementById('selected-date-display').textContent = selectedDate.getDate() + '. ' + MONTHS[selectedDate.getMonth()];
  const list = document.getElementById('appointments-list');
  const dayAppts = appointments.filter(a => a.date === dStr).sort((a,b) => (a.time||'').localeCompare(b.time||''));
  list.innerHTML = dayAppts.length
    ? dayAppts.map(apptCardHTML).join('')
    : `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Keine Termine für diesen Tag</div></div>`;
}

function apptCardHTML(a) {
  const isPending = a.type === 'shared' && a.status === 'pending' && a.created_by !== currentUser;
  const statusBadge = a.type === 'shared'
    ? `<span class="appt-status status-${a.status}">${a.status==='pending'?'Ausstehend':a.status==='accepted'?'✓ Bestätigt':'✕ Abgelehnt'}</span>` : '';
  const actions = isPending
    ? `<div class="appt-actions"><button class="btn-accept" onclick="respondAppt(${a.id},'accepted')">✓ Annehmen</button><button class="btn-decline" onclick="respondAppt(${a.id},'declined')">✕ Ablehnen</button></div>`
    : `<div class="appt-actions" style="justify-content:flex-end"><button class="btn-edit" onclick="editAppt(${a.id})">✏️ Bearbeiten</button><button class="btn-edit" onclick="deleteAppt(${a.id})" style="color:var(--danger);border-color:rgba(201,110,110,0.3)">🗑</button></div>`;
  return `<div class="appt-card ${a.type}">
    <div class="appt-top">
      <div><div class="appt-title">${a.title}</div>${a.note?`<div class="appt-time" style="margin-top:2px;font-style:italic">${a.note}</div>`:''}</div>
      <div class="appt-time">${a.time||''}</div>
    </div>
    <div class="appt-meta">
      <span class="appt-badge badge-${a.type}">${a.type==='shared'?'Beide':a.type==='luisa'?'Luisa':'Deiaa'}</span>
      ${statusBadge}
    </div>
    ${actions}
  </div>`;
}

function renderAllList() {
  const list = document.getElementById('all-list');
  const sorted = [...appointments].sort((a,b) => (a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));
  if (!sorted.length) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Noch keine Termine</div></div>`; return; }
  let html = '', lastDate = '';
  sorted.forEach(a => {
    if (a.date !== lastDate) {
      const d = new Date(a.date + 'T12:00:00');
      html += `<div style="font-size:11px;color:var(--text-muted);margin:20px 0 6px;letter-spacing:0.08em;text-transform:uppercase">${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>`;
      lastDate = a.date;
    }
    html += apptCardHTML(a);
  });
  list.innerHTML = html;
}

async function respondAppt(id, status) {
  const a = appointments.find(x => x.id === id);
  await sb.from('appointments').update({ status }).eq('id', id);
  const name = currentUser === 'luisa' ? 'Luisa' : 'Deiaa';
  addNotif(`${name} hat „${a?.title}" ${status === 'accepted' ? 'angenommen ✓' : 'abgelehnt ✕'}.`);
}

async function deleteAppt(id) {
  await sb.from('appointments').delete().eq('id', id);
}

async function saveAppointment() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Speichern…';

  const payload = {
    title,
    date: document.getElementById('f-date').value,
    time: document.getElementById('f-time').value,
    type: selectedType,
    note: document.getElementById('f-note').value.trim(),
    status: selectedType === 'shared' ? 'pending' : 'accepted',
    created_by: currentUser
  };

  if (editingId) {
    const old = appointments.find(x => x.id === editingId);
    if (old && old.date !== payload.date && payload.type === 'shared') payload.status = 'pending';
    await sb.from('appointments').update(payload).eq('id', editingId);
    addNotif(`Termin „${title}" wurde aktualisiert.`);
  } else {
    await sb.from('appointments').insert(payload);
    if (selectedType === 'shared') addNotif(`${currentUser==='luisa'?'Luisa':'Deiaa'} hat gemeinsamen Termin erstellt: „${title}".`);
  }

  btn.disabled = false; btn.textContent = 'Speichern';
  closeModalDirect();
}

function addNotif(msg) {
  notifications.unshift({ msg, time: new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}), read: false });
  localStorage.setItem('ludi-notifs', JSON.stringify(notifications));
  renderNotifBadge();
}

function renderNotifBadge() {
  const unread = notifications.filter(n => !n.read).length;
  const badge = document.getElementById('notif-count');
  badge.textContent = unread;
  badge.style.display = unread > 0 ? 'flex' : 'none';
}

function renderNotifsList() {
  const list = document.getElementById('notifs-list');
  if (!notifications.length) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-text">Keine Benachrichtigungen</div></div>`; return; }
  list.innerHTML = notifications.map(n => `<div class="notif-item"><div class="notif-header"><div class="notif-dot" style="background:${n.read?'var(--border)':'var(--accent)'}"></div><div class="notif-text">${n.msg}</div></div><div class="notif-time">Heute, ${n.time}</div></div>`).join('');
  notifications.forEach(n => n.read = true);
  localStorage.setItem('ludi-notifs', JSON.stringify(notifications));
  renderNotifBadge();
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Neuer Termin';
  document.getElementById('f-title').value = '';
  document.getElementById('f-date').value = selectedDate.toISOString().split('T')[0];
  document.getElementById('f-time').value = '';
  document.getElementById('f-note').value = '';
  selectedType = currentUser;
  updateTypeButtons();
  document.getElementById('modal').style.display = 'flex';
}

function editAppt(id) {
  const a = appointments.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Termin bearbeiten';
  document.getElementById('f-title').value = a.title;
  document.getElementById('f-date').value = a.date;
  document.getElementById('f-time').value = a.time || '';
  document.getElementById('f-note').value = a.note || '';
  selectedType = a.type;
  updateTypeButtons();
  document.getElementById('modal').style.display = 'flex';
}

function setType(t) { selectedType = t; updateTypeButtons(); }

function updateTypeButtons() {
  ['luisa','deiaa','shared'].forEach(t => {
    document.getElementById('tb-'+t).className = 'type-btn' + (selectedType===t?' active-'+t:'');
  });
}

function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').style.display = 'none'; editingId = null; }

function switchView(view) {
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  const idx = {calendar:0, all:1, notifs:2}[view];
  document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
  if (view === 'notifs') renderNotifsList();
  if (view === 'all') renderAllList();
  if (view === 'calendar') renderAppointments();
}

init();
</script>
</body>
</html>
